name: Update Trivia Questions

on:
  schedule:
    - cron: '0 14 26 6 *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Anthropic
        run: pip install anthropic

      - name: Generate new questions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_trivia.py

      - name: Commit updated file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add world_cup_trivia.html
          git commit -m "Trivia update for June 26, 2026"
          git push
