<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Trivia — Expert Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1a7a4a;
    --green-light: #e8f5ee;
    --green-mid: #2d9e64;
    --red: #c0392b;
    --red-light: #fdf0ee;
    --pitch: #0f4c2a;
    --pitch-mid: #1a6638;
    --gold: #d4a017;
    --gold-light: #fdf6e3;
    --ink: #111;
    --ink-mid: #444;
    --ink-soft: #777;
    --surface: #fff;
    --border: rgba(0,0,0,0.1);
    --radius: 12px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: #f5f5f0;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #fff;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.08em;
    color: #888;
  }

  .logo span {
    color: #1a2f5e;
  }

  .score-chip {
    font-size: 13px;
    font-weight: 500;
    background: #f0f0f0;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 20px;
    padding: 5px 16px;
    color: #444;
  }

  main {
    flex: 1;
    max-width: 680px;
    width: 100%;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .progress-wrap {
    margin-bottom: 1.5rem;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }

  .progress-bar {
    height: 5px;
    background: #ddd;
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pitch-mid), var(--green-mid));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .question-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 1.75rem;
    margin-bottom: 1.25rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  .q-badges {
    display: flex;
    gap: 8px;
    margin-bottom: 1rem;
    align-items: center;
  }

  .badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.03em;
  }

  .badge-category {
    background: #eee;
    color: #555;
  }

  .badge-expert {
    background: var(--red-light);
    color: var(--red);
  }

  .q-text {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.55;
    color: var(--ink);
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.25rem;
  }

  @media (max-width: 500px) {
    .options-grid { grid-template-columns: 1fr; }
  }

  .opt-btn {
    background: var(--surface);
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 0.875rem 1rem;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    line-height: 1.45;
    transition: background 0.12s, border-color 0.12s, transform 0.08s;
  }

  .opt-btn:hover:not(:disabled) {
    background: #f9f9f9;
    border-color: #bbb;
  }

  .opt-btn:active:not(:disabled) {
    transform: scale(0.98);
  }

  .opt-btn.correct {
    background: var(--green-light);
    border-color: var(--green);
    color: #1a4a2e;
    font-weight: 500;
  }

  .opt-btn.wrong {
    background: var(--red-light);
    border-color: var(--red);
    color: #6b1e18;
  }

  .opt-btn.reveal {
    background: var(--green-light);
    border-color: var(--green);
    color: #1a4a2e;
    opacity: 0.7;
  }

  .opt-btn:disabled {
    cursor: default;
  }

  .feedback-box {
    border-radius: 10px;
    padding: 1rem 1.25rem;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 1.25rem;
    display: none;
  }

  .feedback-box.correct {
    background: var(--green-light);
    border: 1px solid #b3ddc4;
    color: #1a4a2e;
  }

  .feedback-box.wrong {
    background: var(--red-light);
    border: 1px solid #f0c0bb;
    color: #6b1e18;
  }

  .feedback-box strong {
    display: block;
    margin-bottom: 4px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .next-btn {
    width: 100%;
    background: var(--pitch);
    border: none;
    border-radius: 10px;
    padding: 0.9rem;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    color: #fff;
    cursor: pointer;
    display: none;
    transition: background 0.15s;
  }

  .next-btn:hover {
    background: var(--pitch-mid);
  }

  /* End screen */
  .end-screen {
    display: none;
    text-align: center;
    padding: 3rem 1rem;
  }

  .end-trophy {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 5rem;
    color: var(--pitch);
    line-height: 1;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }

  .end-trophy span {
    color: var(--gold);
  }

  .end-score-display {
    font-size: 72px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1;
    margin: 1.5rem 0 0.5rem;
  }

  .end-denom {
    font-size: 20px;
    color: var(--ink-soft);
    font-weight: 400;
  }

  .end-message {
    font-size: 16px;
    color: var(--ink-mid);
    margin: 1rem auto 2.5rem;
    max-width: 360px;
    line-height: 1.6;
  }

  .restart-btn {
    background: var(--pitch);
    border: none;
    border-radius: 10px;
    padding: 0.9rem 2.5rem;
    font-size: 15px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    color: #fff;
    cursor: pointer;
    transition: background 0.15s;
  }

  .restart-btn:hover {
    background: var(--pitch-mid);
  }

  footer {
    text-align: center;
    padding: 1.5rem;
    font-size: 12px;
    color: var(--ink-soft);
  }
</style>
</head>

let current = 0;
let score = 0;
let shuffled = [];

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function restartQuiz() {
  current = 0;
  score = 0;
  shuffled = shuffle(questions);
  document.getElementById('end-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('score-chip').textContent = 'Score: 0';
  loadQuestion();
}

function loadQuestion() {
  const q = shuffled[current];
  document.getElementById('q-meta').textContent = `Question ${current + 1} of ${shuffled.length}`;
  document.getElementById('q-category-meta').textContent = q.category;
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('feedback-box').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('progress-fill').style.width = ((current / shuffled.length) * 100) + '%';

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i);
    grid.appendChild(btn);
  });
}

function selectAnswer(i) {
  const q = shuffled[current];
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback-box');
  if (i === q.answer) {
    score++;
    btns[i].classList.add('correct');
    fb.className = 'feedback-box correct';
    fb.innerHTML = `<strong>Correct</strong>${q.fun}`;
  } else {
    btns[i].classList.add('wrong');
    btns[q.answer].classList.add('reveal');
    fb.className = 'feedback-box wrong';
    fb.innerHTML = `<strong>Not quite</strong>${q.fun}`;
  }
  fb.style.display = 'block';
  document.getElementById('score-chip').textContent = `Score: ${score}`;
  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'block';
  nextBtn.textContent = current === shuffled.length - 1 ? 'See my result →' : 'Next question →';
}

function nextQuestion() {
  current++;
  if (current >= shuffled.length) {
    showEnd();
  } else {
    loadQuestion();
  }
}

function showEnd() {
  document.getElementById('quiz-screen').style.display = 'none';
  const end = document.getElementById('end-screen');
  end.style.display = 'block';
  document.getElementById('final-score').innerHTML = `${score}<span class="end-denom"> / ${shuffled.length}</span>`;
  document.getElementById('progress-fill').style.width = '100%';
  const msgs = [
    [0, 7, "You watched the games. You did not do the homework."],
    [8, 14, "Respectable. You know the game, but the details got you."],
    [15, 19, "Strong. Your coach brain is showing."],
    [20, 22, "Excellent. You've clearly rewatched some of these matches."],
    [23, 25, "Flawless. You might actually be a scout."]
  ];
  const msg = msgs.find(([min, max]) => score >= min && score <= max);
  document.getElementById('end-message').textContent = msg ? msg[2] : '';
}

shuffled = shuffle(questions);
loadQuestion();
</script>
